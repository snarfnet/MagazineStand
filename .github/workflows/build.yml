name: Build and Upload to App Store

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v6

    - name: Select Xcode 26
      run: |
        XCODE_APP=$(ls /Applications/ | grep -E "^Xcode_2[6-9]|^Xcode_[3-9][0-9]" | sort -V | tail -1)
        if [ -n "$XCODE_APP" ]; then
          sudo xcode-select -s "/Applications/$XCODE_APP"
        else
          XCODE_APP=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$XCODE_APP"
        fi
        xcodebuild -version

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Set build number
      run: |
        BUILD_NUM=$(( ${{ github.run_number }} + 20 ))
        echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV
        sed -i "" "s/CURRENT_PROJECT_VERSION: .*/CURRENT_PROJECT_VERSION: \"$BUILD_NUM\"/" project.yml

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Set up ASC API Key
      env:
        ASC_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      run: |
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$ASC_API_KEY_CONTENT" | base64 -D > ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8
        cp ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 /tmp/asc_key.p8

    - name: Build Archive
      run: |
        xcodebuild archive \
          -project MagazineStand.xcodeproj \
          -scheme MagazineStand \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/MagazineStand.xcarchive \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=83VGKGSQUH \
          CURRENT_PROJECT_VERSION=$BUILD_NUM \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Export IPA
      run: |
        cat > ExportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>method</key>
          <string>app-store-connect</string>
          <key>teamID</key>
          <string>83VGKGSQUH</string>
          <key>uploadSymbols</key>
          <true/>
          <key>destination</key>
          <string>export</string>
        </dict>
        </plist>
        EOF
        xcodebuild -exportArchive \
          -archivePath build/MagazineStand.xcarchive \
          -exportPath build/export \
          -exportOptionsPlist ExportOptions.plist \
          -allowProvisioningUpdates \
          -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_WDXGY9WX55.p8 \
          -authenticationKeyID WDXGY9WX55 \
          -authenticationKeyIssuerID 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Upload IPA
      run: |
        xcrun altool --upload-app \
          -f build/export/MagazineStand.ipa \
          -t ios \
          --apiKey WDXGY9WX55 \
          --apiIssuer 2be0734f-943a-4d61-9dc9-5d9045c46fec

    - name: Install PyJWT
      run: pip3 install --break-system-packages PyJWT requests

    - name: Submit for Review
      run: python3 scripts/submit.py ${{ env.BUILD_NUM }}
